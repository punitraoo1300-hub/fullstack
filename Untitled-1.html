<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .form-container {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registration</h2>
    <form>

        <!-- Name -->
        <label>Full Name:</label>
        <input type="text" name="name" 
               placeholder="Enter your name"
               required
               pattern="[A-Za-z ]{3,}"
               title="Name should contain only letters and at least 3 characters">

        <!-- Email -->
        <label>Email:</label>
        <input type="email" name="email" 
               placeholder="Enter your email"
               required>

        <!-- Age -->
        <label>Age:</label>
        <input type="number" name="age" 
               min="18" max="60"
               required
               title="Age must be between 18 and 60">

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
